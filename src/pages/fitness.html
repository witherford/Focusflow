<!-- ═══════════════════════════════════════ FITNESS ════ -->
<div class="page" id="page-fitness">
  <div class="page-header">
    <div class="page-header-inner">
      <div class="page-title-wrap"><div class="page-subtitle">Workouts &amp; progression</div><div class="page-title">🏋️ Training</div></div>
      <div class="header-actions">
        <button class="menu-btn nav-menu-btn" aria-label="Open menu">☰</button>
      </div>
    </div>
  </div>
  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active" data-tab="train-tab-today">▶ Today</div>
      <div class="tab" data-tab="train-tab-routines">📋 Routines</div>
      <div class="tab" data-tab="train-tab-schedule">📅 Schedule</div>
      <div class="tab" data-tab="train-tab-progress">📈 Progress</div>
      <div class="tab" data-tab="train-tab-other">🌐 Other</div>
    </div>
  </div>

  <div id="train-tab-today" class="tab-content section">
    <div class="card" style="margin-bottom:14px"><div id="train-active"></div></div>
  </div>

  <div id="train-tab-routines" class="tab-content section" style="display:none">
    <div class="card" style="margin-bottom:14px">
      <div class="card-header"><div class="card-title">Choose a routine</div><div style="font-size:11px;color:var(--text3)">tap to activate</div></div>
      <div id="train-routines" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div id="train-scheduled"></div>
    </div>
  </div>

  <div id="train-tab-schedule" class="tab-content section" style="display:none">
    <div class="card"><div class="card-header"><div class="card-title">Schedule · last 4 + next 4 weeks</div></div><div id="train-schedule"></div></div>
  </div>

  <div id="train-tab-progress" class="tab-content section" style="display:none">
    <div class="card" id="body-measurements-card" style="margin-bottom:14px">
      <div id="body-measurements"></div>
    </div>
    <div class="card" id="fit-progression-card">
      <div id="fit-progression"></div>
    </div>
  </div>

  <div id="train-tab-other" class="tab-content section" style="display:none">
    <div class="card" style="margin-bottom:14px">
      <div class="card-header"><div class="card-title">Other modalities</div><button class="btn btn-sm btn-primary" onclick="openAddModality()">+ Add</button></div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">For cardio, martial arts, and ad-hoc workouts that aren't part of an active routine.</div>
      <div id="fit-list"></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Recent sessions</div></div>
      <div id="fit-log"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="m-fit-modality" style="display:none"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="fm-title">Add Modality</div>
  <div class="form-row"><label>Name</label><input type="text" id="fm-name" autocapitalize="sentences" enterkeyhint="done"></div>
  <div class="form-grid">
    <div class="form-row"><label>Type</label><select id="fm-type"><option value="weightlifting">🏋️ Weightlifting</option><option value="cardio">🏃 Cardio</option><option value="martial">🥋 Martial arts</option><option value="custom">✨ Custom</option></select></div>
    <div class="form-row"><label>Icon</label><input type="text" id="fm-icon" maxlength="2"></div>
  </div>
  <input type="hidden" id="fm-edit-id">
  <div style="display:flex;gap:8px;margin-top:16px">
    <button class="btn btn-primary" style="flex:1" onclick="saveModality()">Save</button>
    <button class="btn" onclick="closeModal('m-fit-modality')">Cancel</button>
  </div>
</div></div>

<div class="modal-overlay" id="m-fit-log" style="display:none"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="fit-log-title">Log session</div>
  <input type="hidden" id="fit-log-modid"><input type="hidden" id="fit-log-type">
  <div id="fit-fields-weight" style="display:none">
    <div class="form-grid3">
      <div class="form-row"><label>Sets</label><input type="number" id="fit-sets" inputmode="numeric"></div>
      <div class="form-row"><label>Reps</label><input type="number" id="fit-reps" inputmode="numeric"></div>
      <div class="form-row"><label>Weight</label><input type="number" id="fit-weight" inputmode="decimal" step="0.5"></div>
    </div>
  </div>
  <div id="fit-fields-cardio" style="display:none">
    <div class="form-row"><label>Distance (km)</label><input type="number" id="fit-distance" inputmode="decimal" step="0.1"></div>
  </div>
  <div id="fit-fields-martial" style="display:none">
    <div class="form-row"><label>Rounds</label><input type="number" id="fit-rounds" inputmode="numeric"></div>
  </div>
  <div id="fit-fields-generic">
    <div class="form-row"><label>Duration (min)</label><input type="number" id="fit-duration" inputmode="numeric"></div>
  </div>
  <div class="form-row"><label>Notes</label><textarea id="fit-notes" rows="2"></textarea></div>
  <div style="display:flex;gap:8px;margin-top:16px">
    <button class="btn btn-primary" style="flex:1" onclick="saveFitLog()">Log session</button>
    <button class="btn" onclick="closeModal('m-fit-log')">Cancel</button>
  </div>
</div></div>
