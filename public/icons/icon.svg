<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f0e"/>
      <stop offset="100%" stop-color="#141a19"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#3ecfb0" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#3ecfb0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#3ecfb0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="0" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Progress ring (3/4 arc) -->
  <g transform="translate(512 512)">
    <circle r="300" fill="none" stroke="#1f2a28" stroke-width="48"/>
    <circle r="300" fill="none" stroke="url(#ring)" stroke-width="48"
            stroke-linecap="round"
            stroke-dasharray="1413.7 1884.9"
            transform="rotate(-90)"/>
  </g>

  <!-- Inner focal dot -->
  <circle cx="512" cy="512" r="120" fill="#3ecfb0"/>
  <circle cx="512" cy="512" r="120" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4"/>

  <!-- Subtle crosshair focus mark -->
  <g stroke="#0b0f0e" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <line x1="512" y1="448" x2="512" y2="488"/>
    <line x1="512" y1="536" x2="512" y2="576"/>
    <line x1="448" y1="512" x2="488" y2="512"/>
    <line x1="536" y1="512" x2="576" y2="512"/>
  </g>
</svg>
