name: Deploy to GitHub Pages

# Builds dist/ and publishes it to GitHub Pages on every push to main.
# No manual dist/ commits needed — source stays in main, built site goes to Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install deps
        # Use `install` not `ci` — npm ci chokes on Windows-generated locks
        # that mark platform-optional esbuild binaries as required.
        run: npm install --no-audit --no-fund --prefer-offline
      - name: Build
        run: npm run build
      - name: Show dist contents on failure
        if: failure()
        run: ls -la dist/ || echo "no dist/"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
